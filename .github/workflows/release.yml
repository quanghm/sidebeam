name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build .app bundle
        run: bash scripts/build-app.sh "${{ steps.version.outputs.version }}"

      - name: Zip .app bundle
        run: cd .build && zip -r BeamerViewer-${{ steps.version.outputs.version }}-macos.zip BeamerViewer.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Beamer Viewer v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: .build/BeamerViewer-${{ steps.version.outputs.version }}-macos.zip
