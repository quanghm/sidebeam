name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    outputs:
      version: ${{ steps.version.outputs.version }}
      sha256: ${{ steps.sha.outputs.sha256 }}
    steps:
      - uses: actions/checkout@v4

      - name: Install librsvg for icon generation
        run: brew install librsvg

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build .app bundle
        run: bash scripts/build-app.sh "${{ steps.version.outputs.version }}"

      - name: Zip .app bundle
        run: cd .build && zip -r BeamerViewer-${{ steps.version.outputs.version }}-macos.zip BeamerViewer.app

      - name: Compute SHA256
        id: sha
        run: echo "sha256=$(shasum -a 256 .build/BeamerViewer-${{ steps.version.outputs.version }}-macos.zip | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Beamer Viewer v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: .build/BeamerViewer-${{ steps.version.outputs.version }}-macos.zip

  update-cask:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew cask
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/quanghm/homebrew-beamer-viewer.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap
          sed -i "s/version \".*\"/version \"${{ needs.build.outputs.version }}\"/" Casks/beamer-viewer.rb
          sed -i "s/sha256 \".*\"/sha256 \"${{ needs.build.outputs.sha256 }}\"/" Casks/beamer-viewer.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/beamer-viewer.rb
          git commit -m "Bump to v${{ needs.build.outputs.version }}"
          git push
